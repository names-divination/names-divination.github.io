<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>星屑の姓名占科</title>

    <style>

        body {

            background:
                linear-gradient(
                    135deg,
                    #0f172a,
                    #1e1b4b
                );

            color: white;

            font-family:
                'Helvetica Neue',
                Arial,
                sans-serif;

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            margin: 0;

            overflow: hidden;
        }

        .container {

            background:
                rgba(255,255,255,0.05);

            backdrop-filter:
                blur(10px);

            padding: 40px;

            border-radius: 16px;

            box-shadow:
                0 8px 32px rgba(0,0,0,0.37);

            border:
                1px solid rgba(255,255,255,0.1);

            width: 90%;

            max-width: 460px;

            text-align: center;
        }

        h1 {

            font-size: 1.8rem;

            margin-bottom: 10px;

            letter-spacing: 2px;

            text-shadow:
                0 0 10px rgba(255,255,255,0.5);
        }

        .prologue {

            font-size: 0.85rem;

            color: #94a3b8;

            line-height: 1.7;

            margin-bottom: 30px;
        }

        .input-group {

            margin-bottom: 20px;

            text-align: left;
        }

        label {

            display: block;

            margin-bottom: 8px;

            color: #cbd5e1;
        }

        input {

            width: 100%;

            padding: 12px;

            border-radius: 8px;

            border:
                1px solid rgba(255,255,255,0.2);

            background:
                rgba(255,255,255,0.1);

            color: white;

            font-size: 1rem;

            box-sizing: border-box;

            outline: none;

            transition: 0.3s;
        }

        input:focus {

            border-color: #818cf8;

            box-shadow:
                0 0 10px rgba(129,140,248,0.5);
        }

        input::placeholder {

            color:
                rgba(255,255,255,0.35);

            letter-spacing: 1px;
        }

        #fortune-btn {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 8px;

            background:
                linear-gradient(
                    90deg,
                    #6366f1,
                    #a855f7
                );

            color: white;

            font-size: 1.1rem;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

            box-shadow:
                0 4px 15px rgba(99,102,241,0.4);
        }

        #fortune-btn:hover {

            transform:
                translateY(-2px);

            box-shadow:
                0 6px 20px rgba(99,102,241,0.6);
        }

        #fortune-btn:disabled {

            background: #475569;

            cursor: not-allowed;

            transform: none;

            box-shadow: none;
        }

        .hidden {

            display: none !important;
        }

        .pair-box {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-top: 20px;

            margin-bottom: 25px;

            gap: 10px;
        }

        .pair-name {

            flex: 1;

            background:
                rgba(255,255,255,0.08);

            padding: 12px;

            border-radius: 10px;

            font-size: 1rem;

            box-shadow:
                0 0 10px rgba(255,255,255,0.05);

            word-break: break-all;
        }

        .pair-center {

            font-size: 1.5rem;

            color: #c4b5fd;
        }

        .result-main {

            margin-top: 10px;

            padding: 18px;

            border-radius: 12px;

            white-space: pre-wrap;

            line-height: 1.9;

            font-size: 1.15rem;

            background:
                rgba(255,255,255,0.04);
        }

        .good {

            color: #fb7185;

            text-shadow:
                0 0 15px rgba(251,113,133,0.7);
        }

        .normal {

            color: #facc15;

            text-shadow:
                0 0 15px rgba(250,204,21,0.7);
        }

        .bad {

            color: #38bdf8;

            text-shadow:
                0 0 15px rgba(56,189,248,0.7);
        }

    </style>

</head>

<body>

    <div class="container">

        <div id="setup-screen">

            <h1>
                ✦ 星屑の姓名占科 ✦
            </h1>

            <div class="prologue">

                古来より、名には魂が宿り、<br>
                響き合う二つの名は未来の軌道を描くという。<br>
                天上の星々が紡ぎ出す、あなた方の引力を今ここに。

            </div>

            <div class="input-group">

                <label>
                    あなたのお名前（ひらがな）
                </label>

                <input
                    type="text"
                    id="u-name"
                    autocomplete="off"
                    placeholder="例：たなかけんじ（フルネーム推奨）"
                >

            </div>

            <div class="input-group">

                <label>
                    お相手のお名前（ひらがな）
                </label>

                <input
                    type="text"
                    id="p-name"
                    autocomplete="off"
                    placeholder="例：さとうゆい（フルネーム推奨）"
                >

            </div>

            <button
                id="fortune-btn"
                onclick="diagnose()"
            >

                星の導きを授かる

            </button>

        </div>

        <div
            id="result-screen"
            class="hidden"
        >

            <h1>
                ✦ 鑑定結果 ✦
            </h1>

            <div class="pair-box">

                <div
                    class="pair-name"
                    id="left-name"
                ></div>

                <div class="pair-center">
                    ✦
                </div>

                <div
                    class="pair-name"
                    id="right-name"
                ></div>

            </div>

            <div
                id="result-output"
                class="result-main"
            ></div>

            <button

                onclick="location.reload()"

                style="
                    margin-top:24px;
                    background:none;
                    border:1px solid rgba(255,255,255,0.3);
                    color:white;
                    padding:8px 16px;
                    border-radius:20px;
                    cursor:pointer;
                "
            >

                もう一度占う

            </button>

        </div>

    </div>

    <script>

        // GAS URL

        const GAS_URL =
        "https://script.google.com/macros/s/AKfycbwSZ7_QUILqM_d2uRG-blhppFkKb2QGcAOoISs8jDv6h9E7oSOOWaBj6b3TOm8YPBZ5/exec";

        function diagnose() {

            const u =
                document
                .getElementById("u-name")
                .value
                .trim();

            const p =
                document
                .getElementById("p-name")
                .value
                .trim();

            const btn =
                document
                .getElementById("fortune-btn");

            // 空欄防止

            if (!u || !p) {

                alert(
                    "お名前を両方入力してください。"
                );

                return;
            }

            // 同名防止

            if (u === p) {

                alert(
                    "✦ 同じ名前同士は占えません ✦"
                );

                return;
            }

            // ひらがな判定

            const hiraRegex =
                /^[ぁ-んーゔ]+$/;

            if (
                !hiraRegex.test(u) ||
                !hiraRegex.test(p)
            ) {

                alert(
                    "✦ ひらがなのみ入力できます ✦"
                );

                return;
            }

            // URLの?id=

            const userId =

                new URLSearchParams(
                    location.search
                ).get("id")

                ||

                "unknown";

            // ローディング

            const originalText =
                btn.innerHTML;

            btn.disabled = true;

            btn.innerHTML =
                "星々を観測中...";

            fetch(
                GAS_URL,
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                        "text/plain"
                    },

                    body: JSON.stringify({

                        p1: u,

                        p2: p,

                        userId: userId
                    })
                }
            )

            .then(res => res.json())

            .then(data => {

                console.log(data);

                btn.disabled = false;

                btn.innerHTML =
                    originalText;

                if (
                    data.status !==
                    "success"
                ) {

                    alert(
                        "✦ 星々が乱れています ✦"
                    );

                    return;
                }

                // 名前表示

                document
                .getElementById(
                    "left-name"
                )
                .innerText = u;

                document
                .getElementById(
                    "right-name"
                )
                .innerText = p;

                // 結果

                const result =
                    data.result;

                // 点数取得

                const match =
                    result.match(
                        /(\d+)点/
                    );

                let score = 50;

                if (match) {

                    score =
                        Number(
                            match[1]
                        );
                }

                // 色分け

                let cls =
                    "normal";

                if (score >= 75) {

                    cls = "good";
                }

                else if (
                    score <= 35
                ) {

                    cls = "bad";
                }

                // 画面切替

                document
                .getElementById(
                    "setup-screen"
                )
                .classList
                .add("hidden");

                const out =
                    document
                    .getElementById(
                        "result-output"
                    );

                out.innerText =
                    result;

                out.className =
                    "result-main " + cls;

                document
                .getElementById(
                    "result-screen"
                )
                .classList
                .remove("hidden");

            })

            .catch(error => {

                console.error(error);

                btn.disabled = false;

                btn.innerHTML =
                    originalText;

                alert(
                    "通信が途絶えました"
                );
            });
        }

    </script>

</body>
</html>
