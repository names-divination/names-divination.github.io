<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI相性診断システム</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h2 {
      color: #333;
      margin-bottom: 20px;
    }
    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }
    label {
      font-size: 14px;
      color: #666;
      display: block;
      margin-bottom: 5px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #ff4a75;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover {
      background: #e03e64;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error { background: #ffebee; color: #c62828; }
    .loading { color: #666; font-size: 14px; margin-top: 15px; }
  </style>
</head>
<body>

<div class="container">
  <h2>AI 相性診断</h2>
  
  <div class="input-group">
    <label for="p1">名前１（ひらがな）</label>
    <input type="text" id="p1" placeholder="例: たなか" required>
  </div>
  
  <div class="input-group">
    <label for="p2">名前２（ひらがな）</label>
    <input type="text" id="p2" placeholder="例: さとう" required>
  </div>
  
  <button id="submitBtn" onclick="diagnose()">診断する</button>
  
  <div id="loading" class="loading" style="display: none;">AIが不適切表現チェックと相性判定中...</div>
  <div id="result"></div>
</div>

<script>
  // ★ここにGASで公開したウェブアプリのURL（/execで終わるもの）を貼り付けてください
  const GAS_URL = "https://script.google.com/macros/s/AKfycbynCKAhJhMboI7dkdOfLYRZeceNiYMZW060CgH93AjLGOPpIEiajT7R0yObgNug4A0k/exec";

  async function diagnose() {
    const p1 = document.getElementById('p1').value.trim();
    const p2 = document.getElementById('p2').value.trim();
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');

    if (!p1 || !p2) {
      alert("両方の名前を入力してください。");
      return;
    }

    // 画面状態の初期化
    submitBtn.disabled = true;
    loading.style.display = "block";
    resultDiv.style.display = "none";
    resultDiv.className = "";

    try {
      // GASはリダイレクトを挟むため、fetchのmode指定やエラーハンドリングに注意が必要です
      const response = await fetch(GAS_URL, {
        method: "POST",
        mode: "cors", // クロスドメイン通信を許可
        headers: {
          "Content-Type": "text/plain" // GASで受け取る際に最も安定する設定
        },
        body: JSON.stringify({ p1: p1, p2: p2 })
      });

      if (!response.ok) {
        throw new Error("ネットワーク通信に失敗しました。");
      }

      const data = await response.json();

      if (data.status === "success") {
        resultDiv.innerText = "結果: " + data.result;
        resultDiv.className = "success";
      } else {
        resultDiv.innerText = "エラー: " + (data.message || "判定できませんでした");
        resultDiv.className = "error";
      }
      resultDiv.style.display = "block";

    } catch (error) {
      resultDiv.innerText = "通信エラーが発生しました。GASの設定（全員に公開されているか等）を確認してください。";
      resultDiv.className = "error";
      resultDiv.style.display = "block";
      console.error(error);
    } finally {
      submitBtn.disabled = false;
      loading.style.display = "none";
    }
  }
</script>

</body>
</html>
